name: Release

# Builds the portable, (mostly-)statically linked nmail distribution artifacts
# and, on a version tag, publishes them to a GitHub Release. Each job just runs
# the self-contained scripts under utils/dist/ (the same ones used for local
# dist builds), so the release is reproducible from the public repo.
#
# Triggers:
#   - push of a `v*` tag  -> build every target, smoke-test, publish release
#   - workflow_dispatch    -> build + smoke-test only (no release), a dry run
#
# Cache warming: GitHub Actions caches are isolated per tag -- one tag's run
# cannot restore another tag's cache; the only shared scope is the default
# branch. So before tagging a release, run this workflow via workflow_dispatch
# on `master` (a no-publish dry run) to populate master-scoped ccache / dep /
# image caches. The subsequent tag run inherits them and skips the cold
# from-source dependency compile (the manylinux image and the macOS deps prefix
# are the slow parts, ~15-20 min each). Check the tag run's "Cache restored
# from key" log line to confirm the hit.
#
# Runners are native-arch (no cross-compilation / emulation). For the Linux
# jobs the glibc compatibility floor comes from the build container images, not
# the runner OS, so runner-image aging is a non-issue there; the macOS job
# builds on the bare runner, but its floor is pinned via
# MACOSX_DEPLOYMENT_TARGET (12.0) in build-macos.sh.
#
# nmail is pure C/C++ (no Go/cgo, no tdlib), so unlike the sister nchat
# workflow this needs no setup-go step and no JOBS memory cap -- every job
# builds at full width and the scripts default JOBS to the core count.

on:
  workflow_dispatch:
  # Comment out below lines to disable release builds and publishing for v tags
  push:
    tags:
      - 'v*'

# Serialize runs for the same ref; never cancel a publishing run midway.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux:
    name: linux-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Full history + tags so package.sh can resolve the release version
          # from the tag pointing at HEAD (git describe --tags --exact-match).
          fetch-depth: 0

      # The dist build runs ccache inside the container against
      # ~/.cache/nmail-dist/ccache-<target> (bind-mounted by build-linux.sh), so
      # cache that directory on the host. Keyed on the run id so every run saves
      # a fresh snapshot; the next run restores the latest via the restore-key
      # prefix. A static key would never re-save once written, leaving the
      # ccache to go stale.
      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ~/.cache/nmail-dist
          key: nmail-dist-${{ matrix.arch }}-${{ github.run_id }}
          restore-keys: |
            nmail-dist-${{ matrix.arch }}-

      # Both build images compile their third-party deps from source, and that
      # compile dominates each Linux job -- so cache the built images and rebuild
      # only when the matching Dockerfile changes. The manylinux (glibc) image
      # builds ~a dozen deps (~15-20 min); the alpine (musl) image builds the
      # four Alpine has no usable static package for -- ncurses, xapian, curl,
      # cyrus-sasl (~4-6 min). Neither dep set benefits from ccache: it is only
      # bind-mounted for the nmail app compile at `docker run`, not during
      # `docker build`, so uncached the deps recompile from source every run. The
      # two images use separate cache dirs + keys so they never clobber each
      # other's tarball.
      - name: Cache musl build image
        id: musl-image
        uses: actions/cache@v5
        with:
          path: ~/.cache/nmail-images-musl
          key: nmail-image-musl-${{ matrix.arch }}-${{ hashFiles('utils/dist/Dockerfile.alpine') }}

      - name: Cache glibc build image
        id: glibc-image
        uses: actions/cache@v5
        with:
          path: ~/.cache/nmail-images
          key: nmail-image-glibc-${{ matrix.arch }}-${{ hashFiles('utils/dist/Dockerfile.manylinux') }}

      - name: Load cached musl build image
        if: steps.musl-image.outputs.cache-hit == 'true'
        run: docker load -i ~/.cache/nmail-images-musl/musl.tar

      - name: Load cached glibc build image
        if: steps.glibc-image.outputs.cache-hit == 'true'
        run: docker load -i ~/.cache/nmail-images/glibc.tar

      - name: Build musl (fully static)
        env:
          NMAIL_DIST_SKIP_IMAGE_BUILD: ${{ steps.musl-image.outputs.cache-hit == 'true' && '1' || '' }}
        run: ./utils/dist/build-linux.sh musl

      - name: Save musl build image for cache
        if: steps.musl-image.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.cache/nmail-images-musl
          docker save "nmail-dist-musl-${{ matrix.arch }}" -o ~/.cache/nmail-images-musl/musl.tar

      - name: Build glibc (mostly static)
        env:
          NMAIL_DIST_SKIP_IMAGE_BUILD: ${{ steps.glibc-image.outputs.cache-hit == 'true' && '1' || '' }}
        run: ./utils/dist/build-linux.sh glibc

      - name: Save glibc build image for cache
        if: steps.glibc-image.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.cache/nmail-images
          docker save "nmail-dist-glibc-${{ matrix.arch }}" -o ~/.cache/nmail-images/glibc.tar

      - name: Package tarballs + checksums
        run: ./utils/dist/package.sh

      - name: Smoke-test artifacts in clean containers
        run: ./utils/dist/smoke.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist-linux-${{ matrix.arch }}
          # Intra-workflow transport only: the publish job downloads these minutes
          # later, and the durable copy of anything worth keeping is the Release
          # asset (release assets are not Actions storage and are not billed).
          # This repo is private, so artifacts here draw on the account's 0.5 GB
          # Actions storage quota; at the 90-day default each run's ~60 MB is held
          # for a quarter, which a single week of iteration alone blew past.
          retention-days: 1
          # Versioned tarballs only -- the main nmail-<ver>-<target>.tar.gz and
          # its detached symbols-<ver>-<target>.tar.gz. The [0-9] anchor (version
          # always starts with a digit) excludes the unversioned staged trees
          # dist/nmail-<target>/ (a letter follows "nmail-") and package.sh's
          # local sha256sums.txt; the publish job recreates a release-wide
          # sha256sums.txt and the combined symbols tarball across every job's
          # tarballs.
          path: |
            dist/nmail-[0-9]*
            dist/symbols-[0-9]*
          if-no-files-found: error

  macos:
    name: macos-arm64
    runs-on: macos-latest # arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install ccache
        run: HOMEBREW_NO_AUTO_UPDATE=1 brew install ccache

      # Single rolling cache for the source-built dep prefix and ccache, both
      # under ~/.cache/nmail-dist -- keyed on the run id so every run saves a
      # fresh snapshot and the next run restores the latest via the restore-key
      # prefix. The dep prefix (openssl/xapian/ncurses/sqlite/libmagic/sasl/zlib
      # built from source, ~15-20 min) is the dominant cost and lives here, so
      # this cache is what makes repeat runs fast. Do NOT route ccache through
      # the shared setup-ccache action: its key is static (compiler + CMakeLists
      # hash), so once written it is never re-saved, and it points ccache at a
      # different dir ($HOME/.ccache) that would not be captured by this cache.
      - name: Cache dep prefix + ccache
        uses: actions/cache@v5
        with:
          path: ~/.cache/nmail-dist
          key: nmail-dist-macos-arm64-${{ github.run_id }}
          restore-keys: |
            nmail-dist-macos-arm64-

      - name: Build macOS (static third-party libs)
        run: |
          export CCACHE_DIR="${HOME}/.cache/nmail-dist/ccache-macos-arm64"
          ccache --max-size=1G
          ./utils/dist/build-macos.sh

      - name: Package tarball + checksum
        run: ./utils/dist/package.sh

      - name: Smoke-test artifact on host
        run: ./utils/dist/smoke.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist-macos-arm64
          # Transport only; see the linux job for the retention rationale.
          retention-days: 1
          # Versioned artifacts only -- main tarball plus its symbols-* tarball
          # (see the linux job for the [0-9] rationale).
          path: |
            dist/nmail-[0-9]*
            dist/symbols-[0-9]*
          if-no-files-found: error

  release:
    name: Publish release
    needs: [linux, macos]
    # Only publish for an actual version tag; workflow_dispatch is a dry run.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist

      # Fold every job's per-target symbols-<ver>-<target>.tar.gz into one
      # cross-platform symbols-<ver>.tar.gz (top dir symbols-<ver>/, one
      # <target>/ subdir per build carrying nmail.debug or nmail.dSYM). This can
      # only happen here, where all jobs' artifacts converge. The glob requires a
      # '-' after <ver>, so it never re-ingests the combined symbols-<ver>.tar.gz.
      #
      # The per-target tarballs are intermediate only: each arch/libc/os builds in
      # a separate job and uploads its own symbols, which are gathered here. Once
      # folded in, they are deleted so the release publishes a SINGLE symbols
      # asset (each target is ~2 MB, the combined ~11 MB -- small enough that one
      # tarball beats five). install.sh --debug fetches the combined and extracts
      # just the running target's subdir. The delete glob keeps the same '-' guard
      # so it never removes the combined tarball itself.
      - name: Assemble combined symbols tarball
        run: |
          cd dist
          ver="${GITHUB_REF_NAME#v}"
          outdir="symbols-${ver}"
          rm -rf "${outdir}" "${outdir}.tar.gz"
          mkdir -p "${outdir}"
          for sym in symbols-${ver}-*.tar.gz; do
            [ -e "${sym}" ] || continue
            base="$(basename "${sym}" .tar.gz)"   # symbols-<ver>-<target>
            target="${base#symbols-${ver}-}"
            tmp="$(mktemp -d)"
            tar -xzf "${sym}" -C "${tmp}"
            mkdir -p "${outdir}/${target}"
            cp -R "${tmp}/${base}/bin/." "${outdir}/${target}/"
            rm -rf "${tmp}"
          done
          tar -czf "${outdir}.tar.gz" "${outdir}"
          rm -rf "${outdir}"
          # Drop the per-target symbols now that they are folded in, so only the
          # combined symbols-<ver>.tar.gz is checksummed and published below.
          rm -f symbols-${ver}-*.tar.gz
          echo "assembled dist/${outdir}.tar.gz:"
          tar -tzf "${outdir}.tar.gz" | sed 's/^/  /'

      # Recreate the single aggregate sha256sums.txt over the full set of
      # published tarballs (the main nmail-* tarballs and the combined
      # symbols-<ver>.tar.gz assembled above -- the per-target symbols were
      # deleted in that step, so the symbols-[0-9]* glob now matches only the
      # combined one). package.sh writes one per build job (covering only that
      # job's targets), so the release-wide file is built here instead; it is
      # byte-identical in format to package.sh's local sha256sums.txt
      # (`sha256sum -c`, bare names, sorted by filename).
      - name: Aggregate checksums
        run: |
          cd dist
          sha256sum nmail-[0-9]*.tar.gz symbols-[0-9]*.tar.gz | sort -k2 > sha256sums.txt
          echo "sha256sums.txt:"
          cat sha256sums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # The main nmail-* tarballs, the single combined symbols-<ver>.tar.gz
          # (the per-target symbols were folded into it and deleted, so the
          # symbols-[0-9]* glob matches only the combined one), plus the single
          # aggregate sha256sums.txt (the per-job sidecars were folded into it).
          files: |
            dist/nmail-[0-9]*.tar.gz
            dist/symbols-[0-9]*.tar.gz
            dist/sha256sums.txt
          fail_on_unmatched_files: true
          generate_release_notes: true
